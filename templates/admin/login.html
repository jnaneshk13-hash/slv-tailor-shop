<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — SLV Tailor Shop</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background:var(--primary-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;">
  <div style="max-width:400px;width:100%;">
    <div class="text-center" style="margin-bottom:1.5rem;">
      <div style="font-size:3rem;">✂️</div>
      <h2 style="color:#fff;margin-top:0.5rem;">SLV Tailor Shop</h2>
      <p style="color:rgba(255,255,255,0.6);">Admin Panel Login</p>
    </div>
    <div class="card">
      <div class="card-body" style="padding:2rem;">
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('admin_login') }}">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem;">🔐 Login</button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:0.82rem;color:var(--text-muted);">Default: admin / admin@slv2024</p>
      </div>
    </div>
    <p style="text-align:center;color:rgba(255,255,255,0.4);font-size:0.8rem;margin-top:1rem;"><a href="{{ url_for('home') }}" style="color:rgba(255,255,255,0.5);">← Back to website</a></p>
  </div>
</body>
</html>
